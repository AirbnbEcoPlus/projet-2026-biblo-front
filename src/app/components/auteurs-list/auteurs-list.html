<div>
  <h2>Liste des Auteurs</h2>

  <div *ngIf="loading()" class="loading">
    Chargement en cours...
  </div>

  <div *ngIf="errorMessage()" class="error-message">
    {{ errorMessage() }}
  </div>

  <div *ngIf="!loading() && auteurs().length === 0" class="no-data">
    Aucun auteur trouvé
  </div>

  <div *ngIf="!loading() && auteurs().length > 0" class="auteurs-container">
    <div *ngFor="let auteur of auteurs()" class="auteur-card">
      <div class="auteur-header">
        <h3>{{ auteur.prenom }} {{ auteur.nom }}</h3>
        <p *ngIf="auteur.dateNaissance" class="date-birth">
          {{ auteur.dateNaissance | date: 'dd/MM/yyyy' }}
        </p>
      </div>

      <div class="auteur-livres">
        <button 
          class="dropdown-btn"
          (click)="toggleAuteur(auteur.id)"
          [class.open]="expandedAuteurId() === auteur.id">
          📚 {{ auteur.livres.length || 0 }} livre(s)
          <span class="arrow">▼</span>
        </button>

        <div 
          *ngIf="expandedAuteurId() === auteur.id && auteur.livres && auteur.livres.length > 0" 
          class="livres-list">
          <div *ngFor="let livre of auteur.livres" class="livre-item">
            <div class="livre-icon">📖</div>
            <div class="livre-details">
              <p class="livre-titre">{{ livre.titre }}</p>
              <p class="livre-date">{{ livre.dateSortie | date: 'yyyy' }}</p>
              <p *ngIf="livre.langue" class="livre-langue">{{ livre.langue }}</p>
            </div>
          </div>
        </div>

        <div 
          *ngIf="expandedAuteurId() === auteur.id && (!auteur.livres || auteur.livres.length === 0)" 
          class="no-livres">
          Aucun livre associé
        </div>
      </div>
    </div>
  </div>
</div>
